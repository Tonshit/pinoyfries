<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact Pinoy Fries</title>
<link rel="icon" href="logo.png" type="image/png"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
<style>
/* Card hover effect */
.hover-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 12px 24px rgba(255, 215, 0, 0.4);
}

/* Down arrow animation */
.bounce-arrow {
    animation: bounce 2s infinite;
}
@keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-10px); }
    60% { transform: translateY(-5px); }
}

/* Floating fries animation */
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}
.floating-fries {
    animation: float 3s ease-in-out infinite;
    position: absolute;
    z-index: 5;
}
</style>
</head>
<body class="bg-gray-900 text-white overflow-hidden font-sans relative">

<!-- Navigation -->
<header class="bg-black bg-opacity-80 backdrop-blur-md py-4 shadow-lg fixed w-full z-30">
  <div class="container mx-auto flex justify-between items-center px-6 max-w-6xl">
    <h1 class="text-2xl font-bold text-yellow-400">Pinoy Fries</h1>
    <nav class="flex space-x-6">
      <a class="hover:text-yellow-400 transition" href="index.html">HOME</a>
      <a class="hover:text-yellow-400 transition" href="alcoholicbeer.html">FRIES</a>
      <a class="hover:text-yellow-400 transition" href="about.html">ABOUT</a>
      <a class="hover:text-yellow-400 transition" href="cart.html">CART</a>
      <a class="hover:text-yellow-400 transition" href="contact.html">CONTACT</a>
    </nav>
  </div>
</header>

<!-- Hero + Contact Section -->
<section class="relative w-screen h-screen flex flex-col md:flex-row items-center justify-center bg-cover bg-center" style="background-image: url('aboutbg.png');">
  <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/50 to-black/70"></div>

  <!-- Left: Hero + Contact Info -->
  <div class="relative z-10 flex flex-col justify-center md:w-1/2 px-6 text-center md:text-left space-y-6">
    <h2 class="text-4xl md:text-5xl font-extrabold text-yellow-400 border-l-4 border-yellow-400 pl-4 inline-block animate-pulse">Contact Us</h2>
    <p class="text-lg md:text-xl max-w-md mx-auto md:mx-0">Questions? Orders? Feedback? Reach out and we’ll respond quickly!</p>
    
    <!-- Contact Cards -->
    <div class="grid grid-cols-1 gap-4 mt-4">
      <div class="bg-gray-800 p-6 rounded-xl shadow-lg flex items-start hover-card transition duration-300">
        <i class="fas fa-map-marker-alt text-yellow-400 text-3xl mr-4"></i>
        <div>
          <h4 class="text-xl font-bold mb-1">Visit Us</h4>
          <p>East Poblacion Rizal Zamboanga City 7104</p>
        </div>
      </div>
      <div class="bg-gray-800 p-6 rounded-xl shadow-lg flex items-start hover-card transition duration-300">
        <i class="fas fa-phone text-yellow-400 text-3xl mr-4"></i>
        <div>
          <h4 class="text-xl font-bold mb-1">Call Us</h4>
          <p>Mon to Sat, 9 AM - 6 PM — (0917) 123-4567</p>
        </div>
      </div>
      <div class="bg-gray-800 p-6 rounded-xl shadow-lg flex items-start hover-card transition duration-300">
        <i class="fas fa-envelope text-yellow-400 text-3xl mr-4"></i>
        <div>
          <h4 class="text-xl font-bold mb-1">Email Us</h4>
          <p><a href="mailto:info@pinoyfries.com" class="text-yellow-400">info@pinoyfries.com</a></p>
        </div>
      </div>
    </div>

  </div>

  <!-- Right: Fries Image -->
  <img src="fries.png" alt="Fries" class="relative z-10 w-1/3 hidden md:block animate-bounce">
</section>

</body>
</html>

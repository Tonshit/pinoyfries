<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinoy Fries - All Receipts</title>
<link rel="icon" href="logo.png" type="image/png">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
<style>
body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #fff8f0 0%, #ffe1b3 100%);
    margin: 0;
    padding-top: 80px;
}

/* Navbar */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background-color: #FF8C00;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    z-index: 100;
    border-bottom-left-radius: 12px;
    border-bottom-right-radius: 12px;
}
.navbar a {
    color: #fff;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
}
.navbar a:hover { text-decoration: underline; }

/* Clear All Button */
.clear-btn {
    background-color: #e74c3c;
    color: #fff;
    font-weight: bold;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
    margin-left: 20px;
}
.clear-btn:hover { background-color: #c0392b; }

/* Receipts container */
.container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    padding: 20px;
}

/* Receipt card */
.receipt-card {
    width: 380px;
    background: #fffaf0;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    padding: 20px;
    margin-bottom: 20px;
    font-size: 14px;
    line-height: 1.4;
    transition: transform 0.2s, box-shadow 0.2s;
}
.receipt-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 24px rgba(0,0,0,0.2);
}
.receipt-card h2, .receipt-card h3 {
    text-align: center;
    margin-bottom: 8px;
    color: #FF8C00;
}
.items-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 13px;
}
.items-table th, .items-table td {
    border-bottom: 1px dashed #ccc;
    padding: 5px 0;
    text-align: left;
}
.items-table th { color: #FF8C00; }
.total {
    margin-top: 10px;
    font-weight: bold;
    text-align: right;
    font-size: 16px;
}
.footer {
    margin-top: 12px;
    text-align: center;
    font-size: 12px;
    color: #555;
    line-height: 1.3;
}
.print-btn {
    display: block;
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #FF8C00;
    color: #fff;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}
.print-btn:hover { background: #e07b00; }

/* Modal */
.modal-bg {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
    z-index: 200;
}
.modal-content {
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
.modal-buttons {
    margin-top: 20px;
    display: flex;
    justify-content: space-around;
}
.modal-buttons button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}
.modal-buttons .confirm { background-color: #e74c3c; color: #fff; }
.modal-buttons .confirm:hover { background-color: #c0392b; }
.modal-buttons .cancel { background-color: #95a5a6; color: #fff; }
.modal-buttons .cancel:hover { background-color: #7f8c8d; }

@media (max-width: 800px) {
    .container { flex-direction: column; align-items: center; }
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo"><img src="logo.png" alt="Pinoy Fries" style="height:40px;"></div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="alcoholicbeer.html">Fries</a>
        <a href="admin.html">Admin</a>
        <button class="clear-btn" onclick="showModal()">Clear All Receipts</button>
    </div>
</div>

<!-- Container for all receipts -->
<div class="container" id="all-receipts"></div>

<!-- Modal -->
<div class="modal-bg" id="modal">
    <div class="modal-content">
        <h2>Confirm Clear All</h2>
        <p>Are you sure you want to delete all receipts? This action cannot be undone.</p>
        <div class="modal-buttons">
            <button class="confirm" onclick="clearAllReceipts()">Yes, Clear All</button>
            <button class="cancel" onclick="hideModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
// Format currency
function formatCurrency(value) {
    return '₱ ' + parseFloat(value).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

// Load all receipts from localStorage
function loadAllReceipts() {
    const allReceipts = JSON.parse(localStorage.getItem('buyers')) || [];
    const container = document.getElementById('all-receipts');
    container.innerHTML = '';

    allReceipts.slice().reverse().forEach((order, index) => {
        const card = document.createElement('div');
        card.className = 'receipt-card';

        card.innerHTML = `
            <h2>PINOY FRIES</h2>
            <p class="text-center">Your Favorite Fries Shop!</p>
            <p><strong>Date:</strong> ${order.date}</p>

            <h3>Customer Info</h3>
            <p><strong>Name:</strong> ${order.name}</p>
            <p><strong>Address:</strong> ${order.address}</p>
            <p><strong>Phone:</strong> ${order.number}</p>

            <h3>Order Items</h3>
            <table class="items-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="items-${index}"></tbody>
            </table>

            <p class="total">Total: ${formatCurrency(order.totalPrice)}</p>
            <p><strong>Payment Method:</strong> ${order.paymentMethod}</p>

            <div class="footer">
                Thank you for your order!<br>
                Visit us again!<br>
                Contact: +63 912 345 6789
            </div>

            <button class="print-btn" onclick="printReceipt(${index})"><i class="fas fa-print"></i> Print Receipt</button>
        `;

        container.appendChild(card);

        const tbody = document.getElementById(`items-${index}`);
        if(order.items) {
            order.items.forEach(item => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = item.name;
                row.insertCell(1).innerText = item.quantity;
                row.insertCell(2).innerText = formatCurrency(item.price * item.quantity);
            });
        }
    });
}

// Print a specific receipt
function printReceipt(index) {
    const allReceipts = document.getElementsByClassName('receipt-card');
    const printContents = allReceipts[index].innerHTML;
    const originalContents = document.body.innerHTML;

    document.body.innerHTML = printContents;
    window.print();
    document.body.innerHTML = originalContents;
    loadAllReceipts();
}

// Modal functions
function showModal() {
    document.getElementById('modal').style.display = 'flex';
}
function hideModal() {
    document.getElementById('modal').style.display = 'none';
}
function clearAllReceipts() {
    localStorage.removeItem('buyers');
    hideModal();
    loadAllReceipts();
}

// Auto-refresh
let lastReceipts = JSON.stringify(JSON.parse(localStorage.getItem('buyers')) || []);
setInterval(() => {
    const currentReceipts = JSON.stringify(JSON.parse(localStorage.getItem('buyers')) || []);
    if(currentReceipts !== lastReceipts) {
        lastReceipts = currentReceipts;
        loadAllReceipts();
    }
}, 200);

window.addEventListener('storage', (event) => {
    if(event.key === 'buyers') loadAllReceipts();
});

window.onload = loadAllReceipts;
</script>

</body>
</html>

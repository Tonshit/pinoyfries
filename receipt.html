<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinoy Fries - Receipt & Payment</title>
<link rel="icon" href="logo.png" type="image/png">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
<style>
body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    padding-top: 70px;
    background: #fff4e6;
    background-image: 
        radial-gradient(circle at 20% 20%, rgba(255, 140, 0,0.2) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255, 200, 0,0.2) 0%, transparent 40%),
        linear-gradient(120deg, #ffe0b2 0%, #fff8f0 100%);
    background-size: cover;
    background-attachment: fixed;
    overflow-x: hidden;
}

/* Navbar */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background-color: #FF8C00;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    z-index: 100;
}

.navbar .logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.navbar .logo img {
    height: 40px;
}

.navbar .logo span {
    font-weight: bold;
    font-size: 18px;
    color: #fff;
    text-shadow: 1px 1px 2px #d97706;
}

.navbar a {
    color: #fff;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
}

.navbar a:hover {
    text-decoration: underline;
}

/* Container for two columns */
.container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 20px;
    flex-wrap: wrap;
    padding: 20px;
}

/* Common card styles */
.card {
    background: rgba(255,255,255,0.95);
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    backdrop-filter: blur(5px);
}

/* Receipt */
.receipt {
    width: 380px;
    font-size: 14px;
    line-height: 1.4;
}

.receipt h2, .receipt h3 {
    text-align: center;
    margin-bottom: 8px;
    color: #FF8C00;
}

.items-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 13px;
}

.items-table th, .items-table td {
    border-bottom: 1px dashed #ccc;
    padding: 5px 0;
    text-align: left;
}

.items-table th {
    color: #FF8C00;
}

.total {
    margin-top: 10px;
    font-weight: bold;
    text-align: right;
    font-size: 16px;
}

.footer {
    margin-top: 12px;
    text-align: center;
    font-size: 12px;
    color: #555;
    line-height: 1.3;
}

/* Print button */
.print-btn {
    display: block;
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background: #FF8C00;
    color: #fff;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.print-btn:hover {
    background: #e07b00;
}

/* Payment */
.payment-container {
    width: 300px;
}

.payment-container h3 {
    text-align: center;
    margin-bottom: 10px;
    color: #FF8C00;
}

.payment-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.payment-options button {
    padding: 12px;
    border: 1px solid #FF8C00;
    border-radius: 6px;
    background: #fff;
    color: #FF8C00;
    cursor: pointer;
    font-weight: bold;
}

.payment-options button.active {
    background: #FF8C00;
    color: #fff;
}

.qr-container {
    margin-top: 15px;
    text-align: center;
    display: none;
    position: relative;
}

.qr-container img {
    width: 180px;
    height: 180px;
    border: 2px solid #FF8C00;
    border-radius: 8px;
}

.qr-container .close-qr {
    position: absolute;
    top: -10px;
    right: -10px;
    background: #FF8C00;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    font-weight: bold;
    cursor: pointer;
}

/* Notification style */
.payment-notification {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #FFFAE6;
    border-left: 5px solid #FF8C00;
    padding: 15px 20px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
    color: #333;
    animation: slideIn 0.5s ease;
    z-index: 999;
}

.payment-notification i {
    color: #FF8C00;
}

.payment-notification button {
    margin-left: auto;
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: #888;
}

.payment-notification button:hover {
    color: #FF8C00;
}

.hidden {
    display: none;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(50px); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 800px) {
    .container {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">
        <img src="logo.png" alt="Pinoy Fries">
        <span>PINOY FRIES RECEIPT</span>
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="alcoholicbeer.html">Fries</a>
        <a href="cart.html">Cart</a>
    </div>
</div>

<div class="container">
    <!-- Payment Section -->
    <div class="card payment-container">
        <h3>Select Payment Method</h3>
        <div class="payment-options">
            <button id="cod-btn" class="active" onclick="selectPayment('COD')">COD</button>
            <button id="gcash-btn" onclick="selectPayment('GCash')">GCash</button>
            <button id="paypal-btn" onclick="selectPayment('PayPal')">PayPal</button>
        </div>

        <div id="qr-container" class="qr-container">
            <button class="close-qr" onclick="closeQR()">×</button>
            <img id="qr-image" src="" alt="QR Code">
        </div>

        <button id="pay-btn" class="print-btn" onclick="payOrder()">Pay</button>
    </div>

    <!-- Receipt Section -->
    <div class="card receipt">
        <h2>PINOY FRIES</h2>
        <p class="text-center">Your Favorite Fries Shop!</p>
        <p id="receipt-date"></p>

        <h3>Customer Info</h3>
        <p id="customer-name"></p>
        <p id="customer-address"></p>
        <p id="customer-number"></p>

        <h3>Order Items</h3>
        <table class="items-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="cart-items-receipt"></tbody>
        </table>

        <p class="total" id="total-price-receipt"></p>

        <p id="payment-method-text"></p>

        <div class="footer">
            Thank you for your order!<br>
            Visit us again!<br>
            Contact: +63 912 345 6789
        </div>

        <button class="print-btn" onclick="window.print()"><i class="fas fa-print"></i> Print Receipt</button>
    </div>
</div>

<div id="payment-notification" class="payment-notification hidden">
    <i class="fas fa-info-circle"></i>
    <span id="notification-text">Payment method selected.</span>
    <button onclick="closeNotification()">×</button>
</div>

<script>
// Default selected payment
let selectedPayment = 'COD';

// Format currency
function formatCurrency(value) {
    return '₱ ' + parseFloat(value).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

// Load receipt info
function loadReceipt() {
    const name = localStorage.getItem('customerName') || "N/A";
    const address = localStorage.getItem('customerAddress') || "N/A";
    const number = localStorage.getItem('customerNumber') || "N/A";
    const date = new Date().toLocaleString('en-PH');

    document.getElementById('receipt-date').innerText = `Date: ${date}`;
    document.getElementById('customer-name').innerText = `Name: ${name}`;
    document.getElementById('customer-address').innerText = `Address: ${address}`;
    document.getElementById('customer-number').innerText = `Phone: ${number}`;

    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const tbody = document.getElementById('cart-items-receipt');
    tbody.innerHTML = '';
    let totalPrice = 0;

    cart.forEach(item => {
        const price = parseFloat(item.price.replace('₱','').replace(/,/g,''));
        const subtotal = (price * item.quantity).toFixed(2);
        totalPrice += parseFloat(subtotal);

        const row = tbody.insertRow();
        row.insertCell(0).innerText = item.name;
        row.insertCell(1).innerText = item.quantity;
        row.insertCell(2).innerText = formatCurrency(subtotal);
    });

    document.getElementById('total-price-receipt').innerText = `Total: ${formatCurrency(totalPrice)}`;
    document.getElementById('payment-method-text').innerText = `Payment Method: ${selectedPayment}`;
}

// Payment method selection
function selectPayment(method) {
    selectedPayment = method;
    document.getElementById('cod-btn').classList.remove('active');
    document.getElementById('gcash-btn').classList.remove('active');
    document.getElementById('paypal-btn').classList.remove('active');

    const qrContainer = document.getElementById('qr-container');
    const qrImage = document.getElementById('qr-image');

    if(method === 'COD') { document.getElementById('cod-btn').classList.add('active'); qrContainer.style.display='none'; }
    if(method === 'GCash') { document.getElementById('gcash-btn').classList.add('active'); qrImage.src='https://img.freepik.com/free-vector/scan-me-qr-code_78370-9714.jpg?semt=ais_rp_50_assets&w=740&q=80'; qrContainer.style.display='block'; }
    if(method === 'PayPal') { document.getElementById('paypal-btn').classList.add('active'); qrImage.src='https://www.paypalobjects.com/marketing/web/us/en/qr-code/QRC-landing.jpg'; qrContainer.style.display='block'; }

    document.getElementById('payment-method-text').innerText = `Payment Method: ${selectedPayment}`;
    showNotification(`Payment method selected: ${method}`);
}

// Close QR
function closeQR() { document.getElementById('qr-container').style.display='none'; }

// Notification
function showNotification(msg) {
    const notif = document.getElementById('payment-notification');
    document.getElementById('notification-text').innerText = msg;
    notif.classList.remove('hidden');
    setTimeout(()=>{notif.classList.add('hidden');},3000);
}
function closeNotification() { document.getElementById('payment-notification').classList.add('hidden'); }

// Pay order
function payOrder() {
    const name = localStorage.getItem('customerName') || "N/A";
    const address = localStorage.getItem('customerAddress') || "N/A";
    const number = localStorage.getItem('customerNumber') || "N/A";
    const date = new Date().toLocaleString('en-PH');

    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    let totalPrice = 0;
    cart.forEach(item => {
        const price = parseFloat(item.price.replace('₱','').replace(/,/g,''));
        totalPrice += price * item.quantity;
    });

    const buyerInfo = {
        date,
        name,
        address,
        number,
        totalPrice,
        paymentMethod: selectedPayment,
        items: cart.map(item => ({
            name: item.name,
            quantity: item.quantity,
            price: parseFloat(item.price.replace('₱','').replace(/,/g,''))
        })),
        status: "Pending"
    };

    const buyers = JSON.parse(localStorage.getItem('buyers')) || [];
    buyers.push(buyerInfo);
    localStorage.setItem('buyers', JSON.stringify(buyers));

    showNotification(`Payment completed via ${selectedPayment}!`);
    loadReceipt();
}

// Load on page load
window.onload = loadReceipt;
</script>
</body>
</html>
